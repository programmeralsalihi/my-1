<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الإدارة - متجر عبيده عامر</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #f97316;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-900 w-full max-w-md rounded-3xl border border-orange-500/30 p-10 shadow-2xl relative">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-orange-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-orange-500/20">
                <i class="fa-solid fa-user-shield text-orange-500 text-3xl"></i>
            </div>
            <h1 class="text-2xl font-black text-white mb-2">تسجيل دخول المسؤول</h1>
            <p class="text-slate-400 text-sm">أدخل البيانات السرية لتفعيل صلاحيات الإدارة</p>
        </div>

        <form id="admin-login-page-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 mr-2">اسم المستخدم</label>
                <input type="text" id="admin-user" placeholder="obaida2026" required 
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-orange-500 outline-none transition">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-slate-400 mr-2">كلمة المرور</label>
                <input type="password" id="admin-pass" placeholder="••••••••" required 
                    class="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-orange-500 outline-none transition">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-5 rounded-xl transition-all transform hover:scale-[1.02] shadow-xl shadow-orange-500/20 flex items-center justify-center gap-3">
                <span id="btn-text">تحقق ودخول للمتجر</span>
                <i class="fa-solid fa-key"></i>
            </button>
        </form>
    </div>

    <script>
        const ADMIN_PASSWORD = "20obaida44";

        document.getElementById('admin-login-page-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('admin-user').value.trim();
            const pass = document.getElementById('admin-pass').value.trim();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');

            if (user !== "obaida2026") {
                alert("خطأ: اسم المستخدم غير صحيح.");
                return;
            }

            btn.disabled = true;
            btnText.innerHTML = `<span class="loader"></span> جاري التحقق...`;

            if (pass === ADMIN_PASSWORD) {
                sessionStorage.setItem('isAdminSession', 'true');
                sessionStorage.setItem('admin_token', pass);
                window.location.href = 'index.htm'; // العودة للموقع بالصلاحيات
            } else {
                alert("خطأ: كلمة المرور غير صحيحة.");
                btn.disabled = false;
                btnText.innerHTML = "تحقق ودخول للمتجر";
            }
        });
    </script>
</body>
</html>
