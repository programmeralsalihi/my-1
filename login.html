<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - متجر عبيده عامر</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0f172a; }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #f97316;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-800 w-full max-w-lg rounded-3xl border border-slate-700 p-10 shadow-2xl overflow-hidden relative">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-orange-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-orange-500/20">
                <i class="fa-solid fa-user-plus text-orange-500 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-white mb-2">مرحباً بك في متجرنا</h1>
            <p class="text-slate-400">أنشئ حسابك الشخصي للمشاركة في آراء المستخدمين</p>
        </div>

        <form id="full-login-form" class="space-y-8">
            <div class="space-y-3">
                <label class="text-sm font-bold text-slate-300 mr-2">الاسم الكامل</label>
                <input type="text" id="reg-name" placeholder="اكتب اسمك هنا..." required 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-white focus:ring-2 focus:ring-orange-500 outline-none transition duration-300">
            </div>

            <div class="space-y-3">
                <label class="text-sm font-bold text-slate-300 mr-2">الصورة الشخصية</label>
                <input type="file" id="reg-avatar" accept="image/*" required 
                    class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-slate-400 file:bg-orange-500 file:border-none file:text-white file:px-6 file:py-2 file:rounded-lg file:ml-4 file:cursor-pointer hover:border-slate-500 transition">
            </div>

            <button type="submit" id="submit-btn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-5 rounded-xl transition-all transform hover:scale-[1.02] shadow-xl shadow-orange-500/20 flex items-center justify-center gap-3">
                <span id="btn-text">دخول للمتجر</span>
                <i class="fa-solid fa-right-to-bracket"></i>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('full-login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const file = document.getElementById('reg-avatar').files[0];
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');

            if (file) {
                btn.disabled = true;
                btnText.innerHTML = `<span class="loader"></span> جاري التحقق...`;

                const reader = new FileReader();
                reader.onloadend = async function() {
                    const imageData = reader.result;
                    
                    // محاكاة فحص الصورة (AI Moderation)
                    await new Promise(resolve => setTimeout(resolve, 1500));
                    
                    // حفظ البيانات في LocalStorage
                    const userProfile = { name: name, avatar: imageData, role: 'User' };
                    localStorage.setItem('user_profile', JSON.stringify(userProfile));
                    
                    // العودة التلقائية للصفحة الرئيسية
                    window.location.href = 'index.htm';
                };
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
